<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#F5F4EF"/>

  <!-- Card index box: outer shell -->
  <rect x="96" y="80" width="320" height="352" rx="16"
        fill="none" stroke="#8B6914" stroke-width="16"/>

  <!-- Lid band -->
  <rect x="96" y="80" width="320" height="80" rx="16"
        fill="#8B6914" opacity="0.15"/>
  <line x1="96" y1="160" x2="416" y2="160"
        stroke="#8B6914" stroke-width="12"/>

  <!-- Pull tab -->
  <rect x="192" y="104" width="128" height="40" rx="14"
        fill="none" stroke="#8B6914" stroke-width="12"/>

  <!-- Card stack lines -->
  <line x1="136" y1="224" x2="376" y2="224" stroke="#8B6914" stroke-width="10" opacity="0.5"/>
  <line x1="136" y1="288" x2="376" y2="288" stroke="#8B6914" stroke-width="10" opacity="0.5"/>
  <line x1="136" y1="352" x2="376" y2="352" stroke="#8B6914" stroke-width="10" opacity="0.5"/>
  <line x1="136" y1="400" x2="290" y2="400" stroke="#8B6914" stroke-width="10" opacity="0.28"/>

  <!-- Tab markers -->
  <circle cx="168" cy="196" r="14" fill="#8B6914" opacity="0.38"/>
  <circle cx="168" cy="260" r="14" fill="#8B6914" opacity="0.38"/>
  <circle cx="168" cy="324" r="14" fill="#8B6914" opacity="0.38"/>
  <circle cx="168" cy="380" r="14" fill="#8B6914" opacity="0.22"/>

</svg>
