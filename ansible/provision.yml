---
- name: Provision ZettelWeb VPS
  hosts: all
  become: true
  tasks:
    # ── System packages ──────────────────────────────────────
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - curl
          - rsync
          - gnupg
          - debian-keyring
          - debian-archive-keyring
          - apt-transport-https
        state: present

    # ── App user ─────────────────────────────────────────────
    - name: Create app user
      ansible.builtin.user:
        name: "{{ app_user }}"
        shell: /bin/bash
        create_home: true

    - name: Authorize SSH key for app user
      ansible.posix.authorized_key:
        user: "{{ app_user }}"
        key: "{{ lookup('file', '~/.ssh/' + lookup('env', 'TF_VAR_ssh_key_name') + '.pub') }}"
        state: present

    # ── Node.js ──────────────────────────────────────────────
    - name: Add NodeSource GPG key
      ansible.builtin.get_url:
        url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        dest: /usr/share/keyrings/nodesource.asc
        mode: "0644"

    - name: Add NodeSource repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/nodesource.asc] https://deb.nodesource.com/node_{{ node_version }}.x nodistro main"
        state: present
        filename: nodesource

    - name: Install Node.js
      ansible.builtin.apt:
        name: nodejs
        state: present
        update_cache: true

    - name: Install PM2 globally
      community.general.npm:
        name: pm2
        global: true
        state: present

    # ── App directories ──────────────────────────────────────
    - name: Create app directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Create notes directory
      ansible.builtin.file:
        path: "{{ notes_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    # ── Caddy ────────────────────────────────────────────────
    - name: Add Caddy GPG key
      ansible.builtin.get_url:
        url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
        dest: /usr/share/keyrings/caddy.asc
        mode: "0644"

    - name: Add Caddy repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/caddy.asc] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main"
        state: present
        filename: caddy-stable

    - name: Install Caddy
      ansible.builtin.apt:
        name: caddy
        state: present
        update_cache: true

    - name: Deploy Caddyfile
      ansible.builtin.template:
        src: templates/Caddyfile.j2
        dest: /etc/caddy/Caddyfile
        owner: root
        group: root
        mode: "0644"
      notify: Reload Caddy

    - name: Enable and start Caddy
      ansible.builtin.systemd:
        name: caddy
        enabled: true
        state: started

    # ── PM2 startup ──────────────────────────────────────────
    - name: Check if PM2 startup is configured
      ansible.builtin.stat:
        path: "/etc/systemd/system/pm2-{{ app_user }}.service"
      register: pm2_service

    - name: Configure PM2 startup for app user
      ansible.builtin.command:
        cmd: "env PATH=$PATH:/usr/bin pm2 startup systemd -u {{ app_user }} --hp /home/{{ app_user }}"
      when: not pm2_service.stat.exists
      changed_when: true

  handlers:
    - name: Reload Caddy
      ansible.builtin.systemd:
        name: caddy
        state: reloaded
