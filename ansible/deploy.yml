---
- name: Build app locally
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Install dependencies
      ansible.builtin.command:
        cmd: npm ci
        chdir: "{{ playbook_dir }}/.."
      changed_when: true

    - name: Run npm build
      ansible.builtin.command:
        cmd: npm run build
        chdir: "{{ playbook_dir }}/.."
      changed_when: true

- name: Deploy to VPS
  hosts: all
  tasks:
    - name: Validate session_secret is set
      ansible.builtin.assert:
        that: session_secret | default('') | length > 0
        fail_msg: "session_secret is required. Pass via: -e session_secret=..."
        quiet: true

    - name: Sync app files to remote
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../"
        dest: "{{ app_dir }}/"
        delete: true
        rsync_opts:
          - "--exclude=node_modules"
          - "--exclude=.git"
          - "--exclude=.env"
          - "--exclude=ansible"
          - "--exclude=terraform"
          - "--exclude=test"
          - "--exclude=e2e"
          - "--exclude=src"

    - name: Template PM2 ecosystem config
      ansible.builtin.template:
        src: templates/ecosystem.config.cjs.j2
        dest: "{{ app_dir }}/ecosystem.config.cjs"
        mode: "0600"

    - name: Install production dependencies
      community.general.npm:
        path: "{{ app_dir }}"
        ci: true
        production: true

    - name: Start or restart app
      ansible.builtin.command:
        cmd: pm2 startOrRestart ecosystem.config.cjs --update-env
        chdir: "{{ app_dir }}"
      changed_when: true

    - name: Save PM2 process list
      ansible.builtin.command:
        cmd: pm2 save
      changed_when: false

    - name: Wait for app to be healthy
      ansible.builtin.uri:
        url: "http://localhost:{{ app_port }}/api/v1/health"
        return_content: true
      register: health
      until: health.status == 200
      retries: 10
      delay: 2
